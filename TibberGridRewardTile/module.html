<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --accent: #7a8a99;
            --bg: transparent;
            --box: rgba(127, 135, 145, .16);
            --text: #ffffff;
            --textmuted: #9fb0c0;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --scale: 1;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --box: rgba(20, 30, 45, .06);
                --text: #1b2430;
                --textmuted: #5c6b7a;
            }
        }

        html {
            height: 100%;
            background: var(--bg);
            overflow: hidden;
        }

        body {
            margin: 0;
            height: 100%;
            box-sizing: border-box;
            font-family: var(--font);
            color: var(--text);
        }

        .wrap {
            box-sizing: border-box;
            padding: 50px 18px 16px;
        }

        .tgr-status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tgr-dot {
            width: calc(14px * var(--scale));
            height: calc(14px * var(--scale));
            border-radius: 50%;
            flex: 0 0 auto;
            color: var(--accent);
            background: var(--accent);
            box-shadow: 0 0 6px 1px currentColor;
        }

        .tgr-status-label {
            font-size: calc(22px * var(--scale));
            font-weight: 700;
            line-height: 1.1;
            color: var(--accent);
        }

        #card.live .tgr-dot {
            animation: tgrpulse 1.4s ease-in-out infinite;
        }

        @keyframes tgrpulse {
            0%, 100% {
                box-shadow: 0 0 4px 0 currentColor;
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 13px 4px currentColor;
                transform: scale(1.18);
            }
        }

        .tgr-rewards {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tgr-reward {
            flex: 1;
            background: var(--box);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .tgr-reward-val {
            font-size: calc(19px * var(--scale));
            font-weight: 700;
            color: var(--text);
        }

        .tgr-reward-lbl {
            font-size: calc(10px * var(--scale));
            color: var(--textmuted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .tgr-wallbox {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 9px;
            background: var(--box);
            border-radius: 10px;
            padding: 9px 11px;
            margin-bottom: 12px;
        }

        .tgr-wb-label {
            font-size: calc(11px * var(--scale));
            color: var(--textmuted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .tgr-wb-val {
            font-size: calc(16px * var(--scale));
            font-weight: 700;
            color: var(--text);
        }

        .tgr-devices {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .tgr-dev {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: calc(13px * var(--scale));
            background: var(--box);
            border-radius: 10px;
            padding: 8px 11px;
        }

        .tgr-dev-dot {
            width: calc(8px * var(--scale));
            height: calc(8px * var(--scale));
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .tgr-dev-name {
            font-weight: 600;
            color: var(--text);
        }

        .tgr-dev-meta {
            margin-left: auto;
            font-size: calc(11px * var(--scale));
            color: var(--textmuted);
            text-align: right;
        }

        .tgr-empty {
            font-size: calc(12px * var(--scale));
            color: var(--textmuted);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="wrap" id="card">
        <div class="tgr-status">
            <span class="tgr-dot"></span>
            <span class="tgr-status-label" id="state-label"></span>
        </div>
        <div class="tgr-rewards">
            <div class="tgr-reward">
                <div class="tgr-reward-val" id="month"></div>
                <div class="tgr-reward-lbl" id="month-label"></div>
            </div>
            <div class="tgr-reward">
                <div class="tgr-reward-val" id="total"></div>
                <div class="tgr-reward-lbl" id="total-label"></div>
            </div>
        </div>
        <div class="tgr-wallbox" id="wallbox-row" style="display:none">
            <span class="tgr-wb-label" id="wallbox-label"></span>
            <span class="tgr-wb-val" id="wallbox-val"></span>
        </div>
        <div class="tgr-devices" id="devices"></div>
    </div>

    <script>
        function handleMessage(payload) {
            var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
            if (!data) {
                return;
            }
            var root = document.documentElement.style;
            // Gesetzte Farbe -> überschreiben; leer -> Theme-Default aus dem CSS verwenden.
            function applyVar(name, val) {
                if (val) {
                    root.setProperty(name, val);
                } else {
                    root.removeProperty(name);
                }
            }
            root.setProperty('--accent', data.accent || '#7a8a99');
            applyVar('--bg', data.bg);
            applyVar('--box', data.box);
            applyVar('--text', data.text);
            applyVar('--textmuted', data.textmuted);
            if (data.font) {
                root.setProperty('--font', data.font);
            }
            root.setProperty('--scale', data.scale || 1);

            document.getElementById('state-label').textContent = data.stateLabel || '';
            document.getElementById('month').textContent = data.month || '';
            document.getElementById('total').textContent = data.total || '';
            document.getElementById('month-label').textContent = data.monthLabel || '';
            document.getElementById('total-label').textContent = data.totalLabel || '';

            document.getElementById('card').classList.toggle('live', data.cls === 'live');

            var wbRow = document.getElementById('wallbox-row');
            if (data.wallbox) {
                document.getElementById('wallbox-label').textContent = data.wallboxLabel || '';
                document.getElementById('wallbox-val').textContent = data.wallbox;
                wbRow.style.display = '';
            } else {
                wbRow.style.display = 'none';
            }

            var dev = document.getElementById('devices');
            dev.textContent = '';
            var list = data.devices || [];
            if (!list.length) {
                var e = document.createElement('div');
                e.className = 'tgr-empty';
                e.textContent = data.emptyLabel || '';
                dev.appendChild(e);
                return;
            }
            list.forEach(function (d) {
                var row = document.createElement('div');
                row.className = 'tgr-dev';
                var dot = document.createElement('span');
                dot.className = 'tgr-dev-dot';
                dot.style.background = d.color || '#7a8a99';
                var name = document.createElement('span');
                name.className = 'tgr-dev-name';
                name.textContent = d.name || '';
                var meta = document.createElement('span');
                meta.className = 'tgr-dev-meta';
                meta.textContent = d.meta || '';
                row.appendChild(dot);
                row.appendChild(name);
                row.appendChild(meta);
                dev.appendChild(row);
            });
        }
    </script>
</body>

</html>
